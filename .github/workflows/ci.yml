name: cheops-ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff
        run: python -m ruff check src tests pages app.py

      - name: Mypy
        run: python -m mypy

      - name: Import Linter
        run: lint-imports

      - name: Pytest with coverage
        run: python -m pytest --cov=src/apris --cov-report=xml --maxfail=1

      - name: Bandit
        run: python -m bandit -q -r src/apris -x src/apris/crypto_ponzi -s B101

      - name: Radon Complexity
        run: python -m radon cc src/apris/cheops -s -n B

      - name: Diff Coverage Gate
        if: github.event_name == 'pull_request'
        run: |
          diff-cover coverage.xml --compare-branch origin/${{ github.base_ref }} --fail-under=80
